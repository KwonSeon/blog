spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: false

snowflake:
  worker-id: 1
  datacenter-id: 1

security:
  public:
    request-matchers:
      - "/error:GET,POST,PUT,PATCH,DELETE,OPTIONS"
      - "/api/projects:GET"
      - "/api/projects/{slug}:GET"
      - "/api/posts:GET"
      - "/api/posts/{slug}:GET"
      - "/api/admin/auth/login:POST"
  cors:
    allow:
      origins:
        - "http://localhost:3000"
  jwt:
    issuer: https://auth.test.s-nowk.com
    secret-key: test-jwt-secret-key-0123456789abcd
    access-token:
      expiretime: 30
