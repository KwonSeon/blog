name: blog

services:
  mysql_blog:
    image: mysql:8.2
    container_name: mysql_blog
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me-root-password}
      MYSQL_DATABASE: ${BLOG_DB_NAME:-blog_db}
      MYSQL_USER: ${BLOG_DB_USERNAME:-blog_user}
      MYSQL_PASSWORD: ${BLOG_DB_PASSWORD:-change-me-blog-db-password}
      TZ: ${APP_TIMEZONE:-Asia/Seoul}
    command:
      - mysqld
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - mysql_blog_data:/var/lib/mysql
    restart: unless-stopped

  flyway_blog:
    image: flyway/flyway:10
    container_name: flyway_blog
    depends_on:
      mysql_blog:
        condition: service_healthy
    environment:
      FLYWAY_URL: jdbc:mysql://mysql_blog:3306/${BLOG_DB_NAME:-blog_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      FLYWAY_USER: ${BLOG_DB_USERNAME:-blog_user}
      FLYWAY_PASSWORD: ${BLOG_DB_PASSWORD:-change-me-blog-db-password}
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
    command:
      - -connectRetries=60
      - migrate
    volumes:
      - ./migrations/blog:/flyway/sql:ro
    restart: "no"

  blog_api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: blog_api
    depends_on:
      mysql_blog:
        condition: service_healthy
      flyway_blog:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: ${BLOG_API_PROFILE:-prod}
      BLOG_DB_URL: jdbc:mysql://mysql_blog:3306/${BLOG_DB_NAME:-blog_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=utf8
      BLOG_DB_USERNAME: ${BLOG_DB_USERNAME:-blog_user}
      BLOG_DB_PASSWORD: ${BLOG_DB_PASSWORD:-change-me-blog-db-password}
      BLOG_API_SNOWFLAKE_WORKER_ID: ${BLOG_API_SNOWFLAKE_WORKER_ID:-1}
      BLOG_API_SNOWFLAKE_DATACENTER_ID: ${BLOG_API_SNOWFLAKE_DATACENTER_ID:-1}
      BLOG_JWT_ISSUER: ${BLOG_JWT_ISSUER:-https://auth.s-nowk.com}
      BLOG_JWT_SECRET_KEY: ${BLOG_JWT_SECRET_KEY:-change-me-blog-jwt-secret}
      TZ: ${APP_TIMEZONE:-Asia/Seoul}
    expose:
      - "8080"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:8080/api/health >/dev/null
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  blog_web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080/api}
        NEXT_PUBLIC_MEDIA_API_BASE_URL: ${NEXT_PUBLIC_MEDIA_API_BASE_URL:-http://localhost:8082/api}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    container_name: blog_web
    depends_on:
      blog_api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080/api}
      NEXT_PUBLIC_MEDIA_API_BASE_URL: ${NEXT_PUBLIC_MEDIA_API_BASE_URL:-http://localhost:8082/api}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NODE_ENV: production
    expose:
      - "3000"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:3000/ >/dev/null
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

networks:
  default:
    name: blog-internal
  edge:
    external: true
    name: ${EDGE_SHARED_NETWORK:-s-nowk-edge}

volumes:
  mysql_blog_data:
    external: true
    name: compose_mysql_blog_data
