      COLLECTOR_INTEGRITY_COORDINATOR_INITIAL_DELAY_MS: ${COLLECTOR_INTEGRITY_COORDINATOR_INITIAL_DELAY_MS:-8000}
      COLLECTOR_INTEGRITY_COORDINATOR_INTERVAL_MS: ${COLLECTOR_INTEGRITY_COORDINATOR_INTERVAL_MS:-5000}
      COLLECTOR_INTEGRITY_STARTUP_CHECK_ENABLED: "false"
      COLLECTOR_INTEGRITY_STARTUP_CLEANUP_BATCHES: ${COLLECTOR_INTEGRITY_STARTUP_CLEANUP_BATCHES:-5}
      COLLECTOR_INTEGRITY_STARTUP_CLEANUP_WORKERS: ${COLLECTOR_INTEGRITY_STARTUP_CLEANUP_WORKERS:-2}
      COLLECTOR_INTEGRITY_PASS_CLEANUP_BATCHES: ${COLLECTOR_INTEGRITY_PASS_CLEANUP_BATCHES:-2}
      COLLECTOR_INTEGRITY_PASS_CLEANUP_WORKERS: ${COLLECTOR_INTEGRITY_PASS_CLEANUP_WORKERS:-2}
      COLLECTOR_INTEGRITY_PASS_INCLUDE_QUOTE_SNAPSHOT: ${COLLECTOR_INTEGRITY_PASS_INCLUDE_QUOTE_SNAPSHOT:-true}
      COLLECTOR_INTEGRITY_PASS_MIN_INTERVAL_MS: ${COLLECTOR_INTEGRITY_PASS_MIN_INTERVAL_MS:-15000}
      COLLECTOR_INTEGRITY_READY_MAX_INVALID_ROWS: ${COLLECTOR_INTEGRITY_READY_MAX_INVALID_ROWS:-0}
      COLLECTOR_BACKFILL_LOW_SESSION_RPS_ENABLED: "false"
      COLLECTOR_BACKFILL_LOW_SESSION_PREP_RPS: ${COLLECTOR_BACKFILL_LOW_SESSION_PREP_RPS:-4.0}
      COLLECTOR_BACKFILL_LOW_SESSION_BOOST_RPS: ${COLLECTOR_BACKFILL_LOW_SESSION_BOOST_RPS:-4.0}
      COLLECTOR_GAP_RECOVERY_ENABLED: "true"
      COLLECTOR_GAP_RECOVERY_CODE_LIMIT: ${COLLECTOR_GAP_RECOVERY_CODE_LIMIT:-80}
      COLLECTOR_GAP_RECOVERY_LOOKBACK_MINUTES: ${COLLECTOR_GAP_RECOVERY_LOOKBACK_MINUTES:-180}
      COLLECTOR_GAP_RECOVERY_MIN_GAP_MINUTES: ${COLLECTOR_GAP_RECOVERY_MIN_GAP_MINUTES:-2}
      COLLECTOR_GAP_RECOVERY_DEFAULT_BACKFILL_MINUTES: ${COLLECTOR_GAP_RECOVERY_DEFAULT_BACKFILL_MINUTES:-120}
      COLLECTOR_RETRY_PROCESS_BATCH_SIZE: ${COLLECTOR_RETRY_PROCESS_BATCH_SIZE:-1}
      COLLECTOR_RETRY_MINUTE_CHUNK_MINUTES: ${COLLECTOR_RETRY_MINUTE_CHUNK_MINUTES:-120}
      COLLECTOR_RETRY_MINUTE_MAX_CHUNKS_PER_TASK: ${COLLECTOR_RETRY_MINUTE_MAX_CHUNKS_PER_TASK:-1}
      COLLECTOR_BACKFILL_PAUSE_RETRY_QUEUE_THRESHOLD: ${COLLECTOR_BACKFILL_PAUSE_RETRY_QUEUE_THRESHOLD:-0}
