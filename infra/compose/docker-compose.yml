# Shared edge/runtime compose for blog + stock.
# Secrets stay in local .env, and cross-project paths use repo-relative paths.
# Local-only config files:
# - ./nginx.conf (copy from nginx.example.conf)
# - ./cloudflared/config.yml (copy from cloudflared/config.example.yml)
services:

  # ---------------------------------------------------------
  # NGINX
  # - 외부 트래픽의 진입점
  # - 현재는 단순 응답용
  # - todo: Next / Spring으로 reverse proxy 예정
  # ---------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: s-nowk-nginx
    # Mac의 8080 포트를 컨테이너 80과 연결
    # Cloudflare Tunnel이 host.docker.internal:8080으로 접근
    ports:
      - "8080:80"
    # nginx 설정 파일을 로컬에서 마운트
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    # Docker가 재시작되면 자동 실행
    restart: unless-stopped



  # ---------------------------------------------------------
  # Cloudflare Tunnel
  # - blog.s-nowk.com 도메인을 로컬로 연결
  # - CGNAT 환경에서도 외부 공개 가능
  # - Docker 내부에서 Mac을 보려면 host.docker.internal 사용
  # ---------------------------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    # blog-home이라는 터널 실행
    command: tunnel run blog-home
    # ~/.cloudflared 폴더를 컨테이너 내부에 마운트
    # config.yml + UUID.json 포함
    volumes:
      - ./cloudflared:/etc/cloudflared
    # nginx가 먼저 떠야 의미 있음
    depends_on:
      - nginx
    restart: unless-stopped



  # ---------------------------------------------------------
  # BLOG DATABASE
  # - blog 서비스 전용 DB
  # - posts / projects / tags 등 저장
  # - Snowflake ID 사용 (AUTO_INCREMENT 사용 안 함)
  # ---------------------------------------------------------
  mysql_blog:
    image: mysql:8.2
    container_name: mysql_blog
    environment:
      # root 계정 비밀번호 (관리용)
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      # 최초 생성될 데이터베이스
      MYSQL_DATABASE: blog_db
      # 일반 사용자 계정
      MYSQL_USER: blog_user
      MYSQL_PASSWORD: ${BLOG_DB_PASSWORD}
      # 타임존 설정
      TZ: Asia/Seoul
    # Mac에서 3310 접근 가능 (DataGrip 연결용)
    ports:
      - "3310:3306"
    # 데이터 영속성 보장 (컨테이너 삭제해도 데이터 유지)
    volumes:
      - mysql_blog_data:/var/lib/mysql
    # 한글 + 이모지 지원 필수 설정
    command:
      - mysqld
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped



  # ---------------------------------------------------------
  # MEDIA DATABASE
  # - S3/MinIO와 연동되는 메타데이터 저장
  # - blog 및 추후 프로젝트 공용 사용
  # - MSA 분리 대비
  # ---------------------------------------------------------
  mysql_media:
    image: mysql:8.2
    container_name: mysql_media
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: media_db
      MYSQL_USER: media_user
      MYSQL_PASSWORD: ${MEDIA_DB_PASSWORD}
      TZ: Asia/Seoul
    # blog DB와 충돌 방지를 위해 Mac의 3307 사용
    ports:
      - "3311:3306"
    volumes:
      - mysql_media_data:/var/lib/mysql
    command:
      - mysqld
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped

  # ---------------------------------------------------------
  # FLYWAY (BLOG DB)
  # - blog_db 스키마 마이그레이션
  # - V1__init.sql 기반
  # ---------------------------------------------------------
  flyway_blog:
    image: flyway/flyway:10
    container_name: flyway_blog
    depends_on:
      - mysql_blog
    environment:
      FLYWAY_URL: jdbc:mysql://mysql_blog:3306/blog_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      FLYWAY_USER: blog_user
      FLYWAY_PASSWORD: ${BLOG_DB_PASSWORD}
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
    command:
      - -connectRetries=60
      - migrate
    volumes:
      - ./migrations/blog:/flyway/sql:ro
    restart: "no"

  # ---------------------------------------------------------
  # FLYWAY (MEDIA DB)
  # - media_db 스키마 마이그레이션
  # - V1__init.sql 기반
  # ---------------------------------------------------------
  flyway_media:
    image: flyway/flyway:10
    container_name: flyway_media
    depends_on:
      - mysql_media
    environment:
      FLYWAY_URL: jdbc:mysql://mysql_media:3306/media_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      FLYWAY_USER: media_user
      FLYWAY_PASSWORD: ${MEDIA_DB_PASSWORD}
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
    command:
      - -connectRetries=60
      - migrate
    volumes:
      - ./migrations/media:/flyway/sql:ro
    restart: "no"

  # ---------------------------------------------------------
  # EXTERNAL DATABASE
  # - 외부 접근 전용 DB
  # - 기존 Mac MySQL 데이터 복원 대상
  # - db.s-nowk.com으로 접근 예정
  # ---------------------------------------------------------
  mysql_external:
    image: mysql:8.2
    container_name: mysql_external
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: Mysql        # 새 DB 이름
      MYSQL_USER: external_user
      MYSQL_PASSWORD: ${EXTERNAL_DB_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "3320:3306"    # Mac에서는 3320으로 접근
    volumes:
      - mysql_external_data:/var/lib/mysql
    command:
      - mysqld
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped

  # ---------------------------------------------------------
  # REDIS (STOCK CACHE)
  # - stock-api 시세 캐시 저장소
  # ---------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: stock_redis
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - ${REDIS_MAXMEMORY:-1536mb}
      - --maxmemory-policy
      - ${REDIS_MAXMEMORY_POLICY:-volatile-lru}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped


  # ---------------------------------------------------------
  # STOCK API
  # - stock-api 백엔드
  # - mysql_external(Mysql DB) 재사용
  # ---------------------------------------------------------
  stock_api:
    build:
      context: ../../../stock/stock-api
      dockerfile: Dockerfile
    container_name: stock_api
    depends_on:
      - mysql_external
      - redis
    environment:
      TZ: Asia/Seoul
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Seoul
      LOG_PATH: /var/log/stock-api
      SPRING_TASK_SCHEDULING_ENABLED: "true"
      DB_URL: jdbc:mysql://mysql_external:3306/stockdash?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      DB_USER: external_user
      DB_PASSWORD: ${EXTERNAL_DB_PASSWORD}
      DB_POOL_MAX_SIZE: ${DB_POOL_MAX_SIZE:-24}
      DB_POOL_MIN_IDLE: ${DB_POOL_MIN_IDLE:-3}
      DB_POOL_CONNECTION_TIMEOUT_MS: ${DB_POOL_CONNECTION_TIMEOUT_MS:-8000}
      DB_POOL_VALIDATION_TIMEOUT_MS: ${DB_POOL_VALIDATION_TIMEOUT_MS:-2000}
      DB_POOL_IDLE_TIMEOUT_MS: ${DB_POOL_IDLE_TIMEOUT_MS:-600000}
      DB_POOL_MAX_LIFETIME_MS: ${DB_POOL_MAX_LIFETIME_MS:-1800000}
      DB_POOL_LEAK_DETECTION_MS: ${DB_POOL_LEAK_DETECTION_MS:-20000}
      APP_DB_TIMEZONE: ${APP_DB_TIMEZONE:-Asia/Seoul}
      MARKET_SESSION_TIER_CACHE_MS: ${MARKET_SESSION_TIER_CACHE_MS:-60000}
      APP_SCHEDULER_POOL_SIZE: "2"
      APP_SCHEDULER_ENABLED: "true"
      COLLECTOR_RUNTIME_SCHEDULING_ENABLED: "true"
      MARKET_QUERY_MOVERS_BACKGROUND_ENABLED: "true"
      BROKER_PROVIDER: ${BROKER_PROVIDER:-MOCK}
      BROKER_DOMAIN: ${BROKER_DOMAIN:-https://api.kiwoom.com}
      BROKER_REALTIME_DOMAIN: ${BROKER_REALTIME_DOMAIN:-wss://api.kiwoom.com:10000}
      BROKER_APP_KEY: ${BROKER_APP_KEY:-}
      BROKER_SECRET: ${BROKER_SECRET:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:you@example.com}
      BROKER_MIN_REQUEST_INTERVAL_MS: ${BROKER_MIN_REQUEST_INTERVAL_MS:-200}
      BROKER_KIWOOM_MIN_REQUEST_INTERVAL_MIN_MS: ${BROKER_KIWOOM_MIN_REQUEST_INTERVAL_MIN_MS:-200}
      BROKER_KIWOOM_MIN_REQUEST_INTERVAL_MAX_MS: ${BROKER_KIWOOM_MIN_REQUEST_INTERVAL_MAX_MS:-1200}
      BROKER_KIWOOM_GLOBAL_MAX_RPS: ${BROKER_KIWOOM_GLOBAL_MAX_RPS:-4.0}
      BROKER_KIWOOM_PARALLEL_ACQUIRE_TIMEOUT_MS: ${BROKER_KIWOOM_PARALLEL_ACQUIRE_TIMEOUT_MS:-1200}
      BROKER_KIWOOM_PARALLEL_START_INTERVAL_MS: ${BROKER_KIWOOM_PARALLEL_START_INTERVAL_MS:-50}
      BROKER_KIWOOM_REFILL_TICK_MS: ${BROKER_KIWOOM_REFILL_TICK_MS:-100}
      BROKER_KIWOOM_TRADE_AMOUNT_SCALE: ${BROKER_KIWOOM_TRADE_AMOUNT_SCALE:-1}
      BROKER_KIWOOM_MAX_CANDLE_CONT_PAGES: ${BROKER_KIWOOM_MAX_CANDLE_CONT_PAGES:-10}
      BROKER_KIWOOM_MAX_DAILY_CANDLE_PAGES: ${BROKER_KIWOOM_MAX_DAILY_CANDLE_PAGES:-10}
      BROKER_KIWOOM_WS_AUTH_MIN_REQUEST_INTERVAL_MS: ${BROKER_KIWOOM_WS_AUTH_MIN_REQUEST_INTERVAL_MS:-200}
      BROKER_KIWOOM_WS_AUTH_MIN_REQUEST_INTERVAL_MIN_MS: ${BROKER_KIWOOM_WS_AUTH_MIN_REQUEST_INTERVAL_MIN_MS:-200}
      BROKER_KIWOOM_WS_AUTH_MIN_REQUEST_INTERVAL_MAX_MS: ${BROKER_KIWOOM_WS_AUTH_MIN_REQUEST_INTERVAL_MAX_MS:-3000}
      BROKER_KIWOOM_WS_AUTH_REFILL_TICK_MS: ${BROKER_KIWOOM_WS_AUTH_REFILL_TICK_MS:-100}
      BROKER_ACQUIRE_TIMEOUT_MS: ${BROKER_ACQUIRE_TIMEOUT_MS:-4000}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      CACHE_QUOTE_ENABLED: ${CACHE_QUOTE_ENABLED:-true}
      CACHE_QUOTE_SCHEDULER_ENABLED: "true"
      CACHE_QUOTE_STRICT: ${CACHE_QUOTE_STRICT:-true}
      CACHE_QUOTE_INITIAL_DELAY_MS: ${CACHE_QUOTE_INITIAL_DELAY_MS:-1000}
      CACHE_QUOTE_REFRESH_MS: ${CACHE_QUOTE_REFRESH_MS:-1000}
      CACHE_QUOTE_MEDIUM_HOURS_REFRESH_MS: ${CACHE_QUOTE_MEDIUM_HOURS_REFRESH_MS:-30000}
      CACHE_QUOTE_OFF_HOURS_REFRESH_MS: ${CACHE_QUOTE_OFF_HOURS_REFRESH_MS:-60000}
      CACHE_QUOTE_TTL_MS: ${CACHE_QUOTE_TTL_MS:-3000}
      CACHE_QUOTE_LOCAL_MAX_ENTRIES: ${CACHE_QUOTE_LOCAL_MAX_ENTRIES:-3000}
      CACHE_QUOTE_PERSIST_ENABLED: ${CACHE_QUOTE_PERSIST_ENABLED:-true}
      CACHE_QUOTE_PERSIST_SCHEDULER_ENABLED: "false"
      COLLECTOR_AFTER_CLOSE_BACKFILL_ENABLED: "true"
      COLLECTOR_LIVE_FORWARD_SYNC_ENABLED: ${COLLECTOR_LIVE_FORWARD_SYNC_ENABLED:-false}
      COLLECTOR_AFTER_CLOSE_BACKFILL_SCAN_MS: ${COLLECTOR_AFTER_CLOSE_BACKFILL_SCAN_MS:-1000}
      COLLECTOR_AFTER_CLOSE_BACKFILL_DAY_SCAN_MS: ${COLLECTOR_AFTER_CLOSE_BACKFILL_DAY_SCAN_MS:-1000}
      COLLECTOR_AFTER_CLOSE_BACKFILL_INTERVAL_MS: ${COLLECTOR_AFTER_CLOSE_BACKFILL_INTERVAL_MS:-5000}
      COLLECTOR_AFTER_CLOSE_BACKFILL_DAY_INTERVAL_MS: ${COLLECTOR_AFTER_CLOSE_BACKFILL_DAY_INTERVAL_MS:-1000}
      COLLECTOR_AFTER_CLOSE_BACKFILL_CODES_PER_RUN: ${COLLECTOR_AFTER_CLOSE_BACKFILL_CODES_PER_RUN:-20}
      COLLECTOR_AFTER_CLOSE_BACKFILL_MAX_FETCHES_PER_RUN: ${COLLECTOR_AFTER_CLOSE_BACKFILL_MAX_FETCHES_PER_RUN:-20}
      COLLECTOR_AFTER_CLOSE_BACKFILL_DAY_PARALLELISM: ${COLLECTOR_AFTER_CLOSE_BACKFILL_DAY_PARALLELISM:-16}
      COLLECTOR_AFTER_CLOSE_BACKFILL_MINUTE_WINDOW_MINUTES: ${COLLECTOR_AFTER_CLOSE_BACKFILL_MINUTE_WINDOW_MINUTES:-43200}
      COLLECTOR_AFTER_CLOSE_BACKFILL_MINUTE_CHUNK_MINUTES: ${COLLECTOR_AFTER_CLOSE_BACKFILL_MINUTE_CHUNK_MINUTES:-1440}
      COLLECTOR_AFTER_CLOSE_BACKFILL_DAY_WINDOW_DAYS: ${COLLECTOR_AFTER_CLOSE_BACKFILL_DAY_WINDOW_DAYS:-20000}
      COLLECTOR_AFTER_CLOSE_BACKFILL_DAY_CHUNK_DAYS: ${COLLECTOR_AFTER_CLOSE_BACKFILL_DAY_CHUNK_DAYS:-20000}
      COLLECTOR_STORAGE_MAX_BYTES: ${COLLECTOR_STORAGE_MAX_BYTES:-1099511627776}
      COLLECTOR_STORAGE_CHECK_INTERVAL_MS: ${COLLECTOR_STORAGE_CHECK_INTERVAL_MS:-60000}
      COLLECTOR_INTEGRITY_CLEANUP_ENABLED: "false"
      COLLECTOR_INTEGRITY_CLEANUP_INTERVAL_MS: ${COLLECTOR_INTEGRITY_CLEANUP_INTERVAL_MS:-5000}
      COLLECTOR_INTEGRITY_CLEANUP_INITIAL_DELAY_MS: ${COLLECTOR_INTEGRITY_CLEANUP_INITIAL_DELAY_MS:-3000}
      COLLECTOR_INTEGRITY_CLEANUP_BATCH_SIZE: ${COLLECTOR_INTEGRITY_CLEANUP_BATCH_SIZE:-20000}
