      COLLECTOR_RECOVERY_AUTO_ENQUEUE_ENABLED: "false"
      ALERT_SCHEDULER_ENABLED: "false"
      REQUEST_PRIORITY_HOLD_MS: ${REQUEST_PRIORITY_HOLD_MS:-3000}
      MARKET_QUERY_WINDOW_CACHE_PRECOMPUTE_ENABLED: "false"
      MANAGEMENT_HEALTH_SHOW_DETAILS: ${MANAGEMENT_HEALTH_SHOW_DETAILS:-never}
      MANAGEMENT_HEALTH_SHOW_COMPONENTS: ${MANAGEMENT_HEALTH_SHOW_COMPONENTS:-never}
      APP_SECURITY_ALLOWED_ORIGIN_PATTERNS: ${APP_SECURITY_ALLOWED_ORIGIN_PATTERNS:-https://stock.s-nowk.com,https://s-nowk.com,https://www.s-nowk.com,https://stock-api.s-nowk.com,http://localhost:3000,http://127.0.0.1:3000}
      APP_AUTH_GOOGLE_CLIENT_ID: ${APP_AUTH_GOOGLE_CLIENT_ID:-}
      APP_AUTH_JWT_SECRET: ${APP_AUTH_JWT_SECRET:-change-me-stock-api-jwt-secret}
      APP_AUTH_ADMIN_EMAILS: ${APP_AUTH_ADMIN_EMAILS:-}
      MARKET_CALENDAR_SERVICE_KEY: ${MARKET_CALENDAR_SERVICE_KEY:-}
      MARKET_CALENDAR_API_BASE_URL: ${MARKET_CALENDAR_API_BASE_URL:-http://apis.data.go.kr/B090041/openapi/service/SpcdeInfoService}
      MARKET_CALENDAR_API_OPERATION: ${MARKET_CALENDAR_API_OPERATION:-getRestDeInfo}
      MARKET_CALENDAR_API_NUM_OF_ROWS: ${MARKET_CALENDAR_API_NUM_OF_ROWS:-100}
      WS_DIAGNOSTICS_ENABLED: ${WS_DIAGNOSTICS_ENABLED:-true}
      WS_DIAGNOSTICS_SUMMARY_INTERVAL_MS: ${WS_DIAGNOSTICS_SUMMARY_INTERVAL_MS:-30000}
      REALTIME_KIWOOM_DIAGNOSTICS_ENABLED: ${REALTIME_KIWOOM_DIAGNOSTICS_ENABLED:-true}
      REALTIME_KIWOOM_DIAGNOSTICS_STATE_LOG_COOLDOWN_MS: ${REALTIME_KIWOOM_DIAGNOSTICS_STATE_LOG_COOLDOWN_MS:-15000}
    ports:
      - "8081:8080"
    volumes:
      - ../../../stock/stock-api/logs:/var/log/stock-api
    expose:
      - "8080"
    networks:
      default:
        aliases:
          - stock-api
    restart: unless-stopped

# -----------------------------------------------------------
# Docker Volume 정의
# - 컨테이너 삭제해도 DB 데이터 유지
# -----------------------------------------------------------

  # ---------------------------------------------------------
  # STOCK WEB
  # - Next.js frontend (production server)
  # ---------------------------------------------------------
  stock_web:
    build:
      context: ../../../stock/stock-web
      dockerfile: Dockerfile
    container_name: stock_web
    environment:
      BACKEND_ORIGIN: http://stock-api:8080
      NEXT_PUBLIC_API_BASE_URL: /api
      NEXT_PUBLIC_WS_BASE_URL: ${NEXT_PUBLIC_WS_BASE_URL:-}
      NEXT_PUBLIC_WS_FORCE_BASE: ${NEXT_PUBLIC_WS_FORCE_BASE:-false}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY:-}
      NEXT_PUBLIC_ENABLE_DEV_TOOLS: ${NEXT_PUBLIC_ENABLE_DEV_TOOLS:-false}
    ports:
      - "3000:3000"
    expose:
      - "3000"
    restart: unless-stopped

  # ---------------------------------------------------------
  # DOCKER SOCKET PROXY
  # - Portainer가 Docker Desktop의 소켓 이슈를 피해서
  #   내부 TCP 경유로 엔진에 연결하도록 중계
  # - 외부 포트는 열지 않음 (compose 내부 네트워크 전용)
  # ---------------------------------------------------------
  docker_proxy:
    image: alpine/socat
    container_name: s-nowk-docker-proxy
    command: >
      tcp-listen:2375,reuseaddr,fork,bind=0.0.0.0
      unix-connect:/var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    expose:
      - "2375"
    restart: unless-stopped

  # ---------------------------------------------------------
  # PORTAINER AGENT
  # - Docker API 버전 충돌 우회를 위해 Portainer가 Agent에 접속
  # ---------------------------------------------------------
  portainer_agent:
    image: portainer/agent:2.39.0
    container_name: s-nowk-portainer-agent
    environment:
      AGENT_CLUSTER_ADDR: tasks.portainer_agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
      - /:/host
    expose:
      - "9001"
    restart: unless-stopped

  # ---------------------------------------------------------
  # PORTAINER
  # - Docker 관리 UI
  # - 외부 도메인(portainer.s-nowk.com)에서 nginx reverse proxy로 접근
  # ---------------------------------------------------------
  portainer:
    image: portainer/portainer-ce:2.39.0
    container_name: s-nowk-portainer
    depends_on:
      - docker_proxy
      - portainer_agent
    command:
      - -H
      - tcp://docker_proxy:2375
      - --log-level
      - DEBUG
    volumes:
      - portainer_data:/data
    expose:
      - "9000"
    restart: unless-stopped

volumes:
  mysql_blog_data:
  mysql_media_data:
