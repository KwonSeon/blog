services:
  blog_api:
    environment:
      SPRING_PROFILES_ACTIVE: ${BLOG_API_PROFILE:-prod}
    networks:
      - default
      - edge

  blog_web:
    build:
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://s-nowk.com}
    environment:
      BLOG_API_BASE_URL: ${BLOG_API_BASE_URL:-http://blog-api:8080/api}
      MEDIA_API_BASE_URL: ${MEDIA_API_BASE_URL:-https://media.s-nowk.com/api}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://s-nowk.com}
    networks:
      - default
      - edge

networks:
  edge:
    external: true
    name: ${EDGE_SHARED_NETWORK:-s-nowk-edge}
