# Copy this file to nginx.conf and replace the example hostnames as needed.

# 0) default
server {
  listen 80 default_server;
  server_name _;

  location / {
    default_type text/plain;
    return 200 "nginx ok\n";
  }
}

# 1) blog
server {
  listen 80;
  server_name blog.example.com;

  resolver 127.0.0.11 ipv6=off valid=30s;
  set $blog_web_upstream "blog_web:3000";

  location / {
    proxy_pass http://$blog_web_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}

# 2) app root + stock web/api/ws
server {
  listen 80;
  server_name app.example.com root.example.com;

  resolver 127.0.0.11 ipv6=off valid=30s;
  set $stock_web_upstream "stock_web:3000";
  set $stock_api_upstream "stock_api:8080";

  # Replace this block if you need a real ads.txt response.
  location = /ads.txt {
    return 404;
  }

  location /api/ {
    proxy_pass http://$stock_api_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /ws/stream {
    proxy_pass http://$stock_api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 3600;
  }

  location / {
    proxy_pass http://$stock_web_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}

# 2-1) www redirect
server {
  listen 80;
  server_name www.example.com;
  return 301 https://root.example.com$request_uri;
}

# 3) api direct
server {
  listen 80;
  server_name api.example.com;

  resolver 127.0.0.11 ipv6=off valid=30s;
  set $stock_api_upstream "stock_api:8080";

  location /ws/stream {
    proxy_pass http://$stock_api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 3600;
  }

  location / {
    proxy_pass http://$stock_api_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}

# 4) admin/ops
server {
  listen 80;
  server_name admin.example.com;

  resolver 127.0.0.11 ipv6=off valid=30s;
  set $portainer_upstream "portainer:9000";

  location / {
    proxy_pass http://$portainer_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 3600;
  }
}
